# PFMI ML Prediction Scheduler - Cron Configuration
# ===================================================
# Runs ML predictions every 30 minutes and writes results to database
#
# Installation (Linux/macOS):
# ---------------------------
# 1. Make the script executable:
#    chmod +x /path/to/PFMI/apps/ml-service/predict_to_db.py
#
# 2. Set environment variables in crontab:
#    crontab -e
#
# 3. Add these lines (replace /path/to/PFMI with actual path):
#
# Environment variables
SUPABASE_URL=https://your-project.supabase.co
SUPABASE_ANON_KEY=your-anon-key-here
ML_SERVICE_URL=http://localhost:8000

# Run ML predictions every 30 minutes
*/30 * * * * cd /path/to/PFMI/apps/ml-service && /usr/bin/python3 predict_to_db.py >> /var/log/pfmi-predictions.log 2>&1

# Alternative schedules:
# Every 15 minutes:
# */15 * * * * cd /path/to/PFMI/apps/ml-service && /usr/bin/python3 predict_to_db.py >> /var/log/pfmi-predictions.log 2>&1

# Every hour at minute 0:
# 0 * * * * cd /path/to/PFMI/apps/ml-service && /usr/bin/python3 predict_to_db.py >> /var/log/pfmi-predictions.log 2>&1

# Every 6 hours:
# 0 */6 * * * cd /path/to/PFMI/apps/ml-service && /usr/bin/python3 predict_to_db.py >> /var/log/pfmi-predictions.log 2>&1

# Daily at 2 AM:
# 0 2 * * * cd /path/to/PFMI/apps/ml-service && /usr/bin/python3 predict_to_db.py >> /var/log/pfmi-predictions.log 2>&1

# Notes:
# - Logs are appended to /var/log/pfmi-predictions.log
# - Ensure the log directory exists and is writable
# - Use absolute paths for Python interpreter and script
# - Test manually first: cd /path/to/PFMI/apps/ml-service && python3 predict_to_db.py --dry-run
